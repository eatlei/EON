name: Subscribe
options:
  bundleIdPrefix: com.codex
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: zh-Hans
settings:
  base:
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: 6.0
targets:
  SubscribeApp:
    type: application
    platform: iOS
    sources:
      - path: SubscribeApp
    dependencies:
      - target: EONWidgets
    info:
      path: SubscribeApp/Info.plist
      properties:
        CFBundleDevelopmentRegion: zh-Hans
        CFBundleLocalizations:
          - zh-Hans
          - zh-Hant
          - en
          - ja
          - ko
          - es
          - fr
          - de
        CFBundleDisplayName: EON
        NSRemindersFullAccessUsageDescription: EON 会在你确认后,把订阅的续费/试用到期提醒添加到「提醒事项」,以便用上系统的多重提醒,确保你不会错过。
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    scheme:
      storeKitConfiguration: Products.storekit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.leon.eon
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        CODE_SIGN_STYLE: Automatic
        # iCloud KVS sync — only signs cleanly with a paid Apple Developer
        # account. The entitlements file declares
        # `com.apple.developer.ubiquity-kvstore-identifier`, which
        # SubscriptionStore uses to sync subscriptions across devices.
        CODE_SIGN_ENTITLEMENTS: SubscribeApp/SubscribeApp.entitlements
        # 付费 Apple Developer Program 账号的 10 位 Team Identifier。
        # 写在这里之后:
        #   - xcodegen 每次重生成都会把它带回 pbxproj,Xcode GUI 不再
        #     问"请选择 Team"
        #   - xcodebuild 命令行也能直接签名
        # 在 https://developer.apple.com/account → Membership 页面能查到。
        DEVELOPMENT_TEAM: 56D3875D7U

  # WidgetKit 扩展。读 App Group 里的快照展示"下次扣费 / 本月总额 / 即将扣费"。
  EONWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: EONWidgets
      - path: SubscribeApp/Shared/WidgetShared.swift
      # 共用 App 的字符串目录,widget 文案跟随系统语言(同一份翻译)。
      - path: SubscribeApp/Localizable.xcstrings
    info:
      path: EONWidgets/Info.plist
      properties:
        CFBundleDisplayName: EON
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.leon.eon.widgets
        CODE_SIGN_ENTITLEMENTS: EONWidgets/EONWidgets.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 56D3875D7U
