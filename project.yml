name: Subscribe
options:
  bundleIdPrefix: com.codex
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: zh-Hans
settings:
  base:
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: 6.0
targets:
  SubscribeApp:
    type: application
    platform: iOS
    sources:
      - path: SubscribeApp
    info:
      path: SubscribeApp/Info.plist
      properties:
        CFBundleDevelopmentRegion: zh-Hans
        CFBundleLocalizations:
          - zh-Hans
          - zh-Hant
          - en
          - ja
          - ko
          - es
          - fr
          - de
        CFBundleDisplayName: EON
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    scheme:
      storeKitConfiguration: Products.storekit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.leon.eon
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        CODE_SIGN_STYLE: Automatic
        # iCloud KVS sync — only signs cleanly with a paid Apple Developer
        # account. The entitlements file declares
        # `com.apple.developer.ubiquity-kvstore-identifier`, which
        # SubscriptionStore uses to sync subscriptions across devices.
        CODE_SIGN_ENTITLEMENTS: SubscribeApp/SubscribeApp.entitlements
        # 付费 Apple Developer Program 账号的 10 位 Team Identifier。
        # 写在这里之后:
        #   - xcodegen 每次重生成都会把它带回 pbxproj,Xcode GUI 不再
        #     问"请选择 Team"
        #   - xcodebuild 命令行也能直接签名
        # 在 https://developer.apple.com/account → Membership 页面能查到。
        DEVELOPMENT_TEAM: 56D3875D7U
