name: Subscribe
options:
  bundleIdPrefix: com.codex
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: zh-Hans
  # Xcode 26 Icon Composer: keep AppIcon.icon as a single package reference
  # instead of expanding its contents (XcodeGen issue #1556).
  fileTypes:
    icon:
      file: true
settings:
  base:
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: 6.0
targets:
  SubscribeApp:
    type: application
    platform: iOS
    sources:
      - path: SubscribeApp
    info:
      path: SubscribeApp/Info.plist
      properties:
        CFBundleDevelopmentRegion: zh-Hans
        CFBundleLocalizations:
          - zh-Hans
          - en
        CFBundleDisplayName: EON
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    scheme:
      storeKitConfiguration: Products.storekit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.leon.eon
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Compile both AppIcon.icon (iOS 26 Liquid Glass) and the
        # AppIcon.appiconset fallback (back-deployment / Simulator).
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
        ENABLE_PREVIEWS: YES
        CODE_SIGN_STYLE: Automatic
