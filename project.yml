name: Subscribe
options:
  bundleIdPrefix: com.codex
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: zh-Hans
settings:
  base:
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: 6.0
targets:
  SubscribeApp:
    type: application
    platform: iOS
    sources:
      - path: SubscribeApp
    info:
      path: SubscribeApp/Info.plist
      properties:
        CFBundleDevelopmentRegion: zh-Hans
        CFBundleLocalizations:
          - zh-Hans
          - zh-Hant
          - en
          - ja
          - ko
          - es
          - fr
          - de
        CFBundleDisplayName: EON
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    scheme:
      storeKitConfiguration: Products.storekit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.leon.eon
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        CODE_SIGN_STYLE: Automatic
        # iCloud KVS sync — only signs cleanly with a paid Apple Developer
        # account. The entitlements file declares
        # `com.apple.developer.ubiquity-kvstore-identifier`, which
        # SubscriptionStore uses to sync subscriptions across devices.
        CODE_SIGN_ENTITLEMENTS: SubscribeApp/SubscribeApp.entitlements
        # TODO: 把下面这行的注释去掉, 改成你 Apple Developer 账号的 10 位 Team
        #       Identifier (在 https://developer.apple.com/account → Membership
        #       页面能查到). 设了之后 xcodebuild 命令行也能直接签名,无需在
        #       Xcode GUI 里手工选 Team.
        # DEVELOPMENT_TEAM: ABCDE12345
